services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    working_dir: /workspace
    volumes:
      - ../:/workspace
    environment:
      PYTHONPATH: /workspace/src
      CONFIG_PATH: config/default.yaml
      CLASSES_PATH: config/classes.yaml
      YOLO_CONFIG_DIR: /tmp
    command: bash

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    working_dir: /workspace
    volumes:
      - ../:/workspace
    environment:
      PYTHONPATH: /workspace/src
      CONFIG_PATH: config/default.yaml
      CLASSES_PATH: config/classes.yaml
      YOLO_CONFIG_DIR: /tmp
    ports:
      - "8000:8000"
    command: uvicorn fire_extinguisher_inspection.api.main:app --host 0.0.0.0 --port 8000
